<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Smart geofenced safe zones around home, school, and park">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E6D5FF"/>
    </linearGradient>
    <linearGradient id="map" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <radialGradient id="zoneHome" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="zoneSchool" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="zonePark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#bg)"/>

  <!-- Map card -->
  <g filter="url(#soft)">
    <rect x="40" y="44" width="400" height="272" rx="20" fill="url(#map)"/>
    <!-- map grid -->
    <g stroke="#DDD6FE" stroke-width="1" opacity="0.7">
      <line x1="40" y1="100" x2="440" y2="100"/>
      <line x1="40" y1="160" x2="440" y2="160"/>
      <line x1="40" y1="220" x2="440" y2="220"/>
      <line x1="40" y1="280" x2="440" y2="280"/>
      <line x1="120" y1="44" x2="120" y2="316"/>
      <line x1="200" y1="44" x2="200" y2="316"/>
      <line x1="280" y1="44" x2="280" y2="316"/>
      <line x1="360" y1="44" x2="360" y2="316"/>
    </g>
    <!-- roads -->
    <g stroke="#C4B5FD" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M 60 250 Q 180 230 240 200 Q 320 165 420 130"/>
      <path d="M 80 80 Q 140 150 240 200"/>
      <path d="M 240 200 Q 300 270 400 300"/>
    </g>
    <g stroke="#FFFFFF" stroke-width="2" stroke-dasharray="3 5" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M 60 250 Q 180 230 240 200 Q 320 165 420 130"/>
    </g>
  </g>

  <!-- Home zone -->
  <g transform="translate(110 100)">
    <circle r="46" fill="url(#zoneHome)"/>
    <circle r="46" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="4 4" opacity="0.7"/>
    <!-- house icon -->
    <g transform="translate(-12 -10)">
      <path d="M 0 12 L 12 0 L 24 12 L 24 24 L 0 24 Z" fill="#22C55E"/>
      <rect x="9" y="14" width="6" height="10" fill="#FFFFFF"/>
    </g>
    <text x="0" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#15803D">Home</text>
  </g>

  <!-- School zone (with child marker inside) -->
  <g transform="translate(280 200)">
    <circle r="54" fill="url(#zoneSchool)"/>
    <circle r="54" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- school icon -->
    <g transform="translate(-12 -16)">
      <rect x="0" y="6" width="24" height="18" fill="#7C3AED"/>
      <path d="M -2 6 L 12 -4 L 26 6 Z" fill="#5B21B6"/>
      <rect x="9" y="14" width="6" height="10" fill="#FFFFFF"/>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#5B21B6">School</text>

    <!-- Child marker (pulsing) -->
    <g transform="translate(12 -2)">
      <circle r="14" fill="#DC2626" opacity="0.25">
        <animate attributeName="r" values="10;18;10" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0;0.35" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <path d="M 0 -10 C -6 -10 -10 -6 -10 0 C -10 8 0 14 0 14 C 0 14 10 8 10 0 C 10 -6 6 -10 0 -10 Z" fill="#DC2626"/>
      <circle cx="0" cy="0" r="3.5" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Park zone -->
  <g transform="translate(380 250)">
    <circle r="38" fill="url(#zonePark)"/>
    <circle r="38" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 4" opacity="0.7"/>
    <!-- tree icon -->
    <g transform="translate(0 -4)">
      <circle r="10" fill="#22C55E"/>
      <rect x="-2" y="6" width="4" height="8" fill="#78350F"/>
    </g>
    <text x="0" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#B45309">Park</text>
  </g>

  <!-- Notification chip -->
  <g transform="translate(56 264)" filter="url(#soft)">
    <rect width="200" height="42" rx="12" fill="#FFFFFF"/>
    <circle cx="22" cy="21" r="10" fill="#22C55E"/>
    <path d="M 17 21 L 21 25 L 27 18" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="19" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">Arrived at School</text>
    <text x="40" y="32" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">8:42 AM · Geofence alert</text>
  </g>
</svg>
