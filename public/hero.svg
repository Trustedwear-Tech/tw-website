<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Parent watching child playing live through TrustedWear smartwatch with 7-camera 360-degree view">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E6D5FF"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <linearGradient id="phoneFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#FBBF77"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="kidShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="watchBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="watchStrap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="lensGloss" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lightShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="-110" y="-220" width="220" height="440" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background plate -->
  <rect width="600" height="600" rx="48" fill="url(#bg)"/>

  <!-- Streaming dots from watch (left) to phone (center) -->
  <g opacity="0.7">
    <circle cx="135" cy="200" r="3" fill="#7C3AED">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="220" r="3" fill="#7C3AED">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="205" cy="240" r="3" fill="#7C3AED">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="260" r="3" fill="#7C3AED">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ====== WATCH (top-left) showing 360° camera ring ====== -->
  <g transform="translate(105 175) rotate(-12)" filter="url(#softShadow)">
    <!-- Straps -->
    <rect x="-22" y="-78" width="44" height="40" rx="6" fill="url(#watchStrap)"/>
    <rect x="-22" y="38"  width="44" height="40" rx="6" fill="url(#watchStrap)"/>
    <!-- Case -->
    <rect x="-52" y="-44" width="104" height="88" rx="22" fill="url(#watchBody)"/>
    <!-- Crown -->
    <rect x="52" y="-8" width="6" height="16" rx="2" fill="#4C1D95"/>
    <!-- Inner bezel for cameras -->
    <rect x="-44" y="-36" width="88" height="72" rx="16" fill="#3B0F7A"/>
    <!-- Center screen / processor -->
    <rect x="-22" y="-14" width="44" height="28" rx="6" fill="#0F172A"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="800" fill="#A78BFA">360°</text>

    <!-- 7 camera lenses arranged around the watch face -->
    <g>
      <circle cx="-34" cy="-26" r="5.5" fill="url(#lensGloss)"/>
      <circle cx="0"   cy="-30" r="5.5" fill="url(#lensGloss)"/>
      <circle cx="34"  cy="-26" r="5.5" fill="url(#lensGloss)"/>
      <circle cx="36"  cy="0"   r="5.5" fill="url(#lensGloss)"/>
      <circle cx="34"  cy="26"  r="5.5" fill="url(#lensGloss)"/>
      <circle cx="0"   cy="30"  r="5.5" fill="url(#lensGloss)"/>
      <circle cx="-34" cy="26"  r="5.5" fill="url(#lensGloss)"/>
    </g>
  </g>

  <!-- 7-camera label badge -->
  <g transform="translate(40 100)" filter="url(#lightShadow)">
    <rect width="140" height="32" rx="16" fill="#FFFFFF"/>
    <circle cx="18" cy="16" r="6" fill="#7C3AED"/>
    <circle cx="18" cy="16" r="2.5" fill="#FFFFFF"/>
    <text x="32" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0F172A">7 Cameras · 360°</text>
  </g>

  <!-- ====== PHONE (center-right) showing live video of kid ====== -->
  <g transform="translate(380 305) rotate(6)" filter="url(#softShadow)">
    <!-- Phone outer frame -->
    <rect x="-122" y="-232" width="244" height="464" rx="36" fill="url(#phoneFrame)"/>
    <!-- Phone body -->
    <rect x="-116" y="-226" width="232" height="452" rx="30" fill="url(#phoneBody)"/>
    <!-- Screen -->
    <rect x="-110" y="-220" width="220" height="440" rx="22" fill="#0F172A"/>

    <!-- Screen content (clipped) -->
    <g clip-path="url(#screenClip)">
      <!-- Sky -->
      <rect x="-110" y="-220" width="220" height="320" fill="url(#sky)"/>
      <!-- Sun -->
      <circle cx="60" cy="-150" r="22" fill="#FEF3C7" opacity="0.9"/>
      <!-- Clouds -->
      <g fill="#FFFFFF" opacity="0.7">
        <ellipse cx="-60" cy="-160" rx="22" ry="8"/>
        <ellipse cx="-50" cy="-168" rx="14" ry="7"/>
        <ellipse cx="20"  cy="-100" rx="18" ry="6"/>
      </g>
      <!-- Trees in distance -->
      <g fill="#16A34A" opacity="0.85">
        <circle cx="-80" cy="80" r="26"/>
        <rect x="-84" y="80" width="8" height="20" fill="#78350F"/>
        <circle cx="80" cy="76" r="22"/>
        <rect x="76" y="76" width="6" height="18" fill="#78350F"/>
      </g>
      <!-- Grass ground -->
      <path d="M -110 100 Q 0 80 110 100 L 110 220 L -110 220 Z" fill="url(#grass)"/>

      <!-- Child playing (running with arms up) -->
      <g transform="translate(-10 60)">
        <!-- shadow -->
        <ellipse cx="0" cy="70" rx="34" ry="6" fill="#000000" opacity="0.15"/>
        <!-- legs (mid-run) -->
        <path d="M -8 30 Q -16 50 -22 68 L -12 70 Q -6 52 0 36 Z" fill="#1E40AF"/>
        <path d="M 8 30 Q 18 46 24 60 L 14 66 Q 6 50 0 36 Z" fill="#1E3A8A"/>
        <!-- shoes -->
        <ellipse cx="-18" cy="68" rx="8" ry="4" fill="#FFFFFF"/>
        <ellipse cx="20" cy="62" rx="8" ry="4" fill="#FFFFFF"/>
        <!-- body / shirt -->
        <path d="M -22 -10 Q -22 -22 0 -22 Q 22 -22 22 -10 L 18 32 Q 0 38 -18 32 Z" fill="url(#kidShirt)"/>
        <!-- arms raised -->
        <path d="M -22 -8 Q -38 -20 -42 -42 L -34 -46 Q -28 -28 -16 -16 Z" fill="url(#kidShirt)"/>
        <path d="M 22 -8 Q 38 -22 44 -44 L 36 -48 Q 30 -30 18 -16 Z" fill="url(#kidShirt)"/>
        <!-- hands -->
        <circle cx="-38" cy="-44" r="6" fill="#FFD7B5"/>
        <circle cx="40" cy="-46" r="6" fill="#FFD7B5"/>
        <!-- head -->
        <circle cx="0" cy="-36" r="18" fill="#FFD7B5"/>
        <!-- hair -->
        <path d="M -18 -40 Q -16 -56 0 -56 Q 16 -56 18 -40 Q 16 -46 0 -46 Q -16 -46 -18 -40 Z" fill="#5C2E0E"/>
        <!-- eyes -->
        <circle cx="-6" cy="-36" r="1.5" fill="#0F172A"/>
        <circle cx="6"  cy="-36" r="1.5" fill="#0F172A"/>
        <!-- smile -->
        <path d="M -4 -30 Q 0 -27 4 -30" stroke="#0F172A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <!-- watch on left wrist -->
        <rect x="-44" y="-48" width="12" height="8" rx="2" fill="#5B21B6"/>
        <rect x="-42" y="-46" width="8" height="4" rx="1" fill="#A78BFA"/>
      </g>

      <!-- Ball -->
      <g transform="translate(40 130)">
        <circle r="12" fill="#FBBF24"/>
        <path d="M -12 0 Q 0 -8 12 0" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
        <path d="M -12 0 Q 0 8 12 0" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
      </g>

      <!-- LIVE badge -->
      <g transform="translate(-96 -208)">
        <rect width="58" height="22" rx="11" fill="#DC2626"/>
        <circle cx="12" cy="11" r="4" fill="#FFFFFF">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <text x="22" y="15" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF">LIVE</text>
      </g>

      <!-- Camera number badge -->
      <g transform="translate(48 -208)">
        <rect width="58" height="22" rx="11" fill="rgba(15,23,42,0.7)"/>
        <text x="29" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">CAM 3/7</text>
      </g>

      <!-- Camera switcher dots at bottom -->
      <g transform="translate(0 184)">
        <circle cx="-36" cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
        <circle cx="-24" cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
        <circle cx="-12" cy="0" r="5" fill="#FFFFFF"/>
        <circle cx="0"   cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
        <circle cx="12"  cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
        <circle cx="24"  cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
        <circle cx="36"  cy="0" r="3.5" fill="#FFFFFF" opacity="0.4"/>
      </g>
    </g>

    <!-- Phone notch -->
    <rect x="-32" y="-220" width="64" height="14" rx="7" fill="#0F172A"/>
  </g>

  <!-- Parent avatar (top-right corner, watching) -->
  <g transform="translate(490 80)" filter="url(#lightShadow)">
    <circle cx="32" cy="32" r="32" fill="#FFFFFF"/>
    <circle cx="32" cy="24" r="10" fill="#7C3AED"/>
    <path d="M 12 54 C 12 41 22 36 32 36 C 42 36 52 41 52 54 Z" fill="#7C3AED"/>
    <!-- "watching" eye indicator -->
    <circle cx="56" cy="10" r="10" fill="#22C55E"/>
    <circle cx="56" cy="10" r="4" fill="#FFFFFF"/>
  </g>

  <!-- "Live: Park Campus" chip (bottom-left) -->
  <g transform="translate(40 510)" filter="url(#softShadow)">
    <rect width="240" height="58" rx="29" fill="#FFFFFF"/>
    <circle cx="32" cy="29" r="7" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="29" r="13" fill="#22C55E" opacity="0.2">
      <animate attributeName="r" values="7;16;7" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="52" y="35" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0F172A">Watching · Live now</text>
  </g>
</svg>
