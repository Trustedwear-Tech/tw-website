<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Child playing in a garden being safely monitored from a phone">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E6D5FF"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="slide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#bg)"/>

  <!-- Sun -->
  <circle cx="80" cy="70" r="26" fill="#FEF3C7" opacity="0.85"/>
  <!-- Clouds -->
  <g fill="#FFFFFF" opacity="0.7">
    <ellipse cx="160" cy="60" rx="28" ry="10"/>
    <ellipse cx="172" cy="50" rx="18" ry="8"/>
    <ellipse cx="370" cy="80" rx="22" ry="8"/>
  </g>
  <!-- Trees -->
  <g>
    <circle cx="60" cy="220" r="34" fill="#16A34A"/>
    <rect x="56" y="220" width="8" height="28" fill="#78350F"/>
    <circle cx="420" cy="210" r="30" fill="#15803D"/>
    <rect x="416" y="210" width="8" height="32" fill="#78350F"/>
  </g>
  <!-- Grass ground -->
  <path d="M 0 250 Q 240 230 480 250 L 480 360 L 0 360 Z" fill="url(#grass)"/>

  <!-- Slide structure -->
  <g filter="url(#soft)">
    <!-- ladder -->
    <rect x="320" y="150" width="6" height="120" fill="#A78BFA"/>
    <rect x="360" y="150" width="6" height="120" fill="#A78BFA"/>
    <rect x="320" y="170" width="46" height="4" fill="#A78BFA"/>
    <rect x="320" y="190" width="46" height="4" fill="#A78BFA"/>
    <rect x="320" y="210" width="46" height="4" fill="#A78BFA"/>
    <rect x="320" y="230" width="46" height="4" fill="#A78BFA"/>
    <!-- top platform -->
    <rect x="305" y="142" width="66" height="14" rx="3" fill="#7C3AED"/>
    <!-- slide -->
    <path d="M 320 156 Q 280 200 220 256 L 200 256 Q 260 200 300 156 Z" fill="url(#slide)"/>
    <rect x="195" y="252" width="40" height="8" rx="3" fill="#F59E0B"/>
  </g>

  <!-- Child sliding down -->
  <g transform="translate(245 215)">
    <!-- legs -->
    <path d="M -6 18 L -2 38 L 8 38 L 6 18 Z" fill="#1E40AF"/>
    <path d="M 4 18 L 14 36 L 22 32 L 14 16 Z" fill="#1E3A8A"/>
    <!-- shoes -->
    <ellipse cx="3" cy="40" rx="7" ry="3" fill="#FFFFFF"/>
    <ellipse cx="22" cy="34" rx="7" ry="3" fill="#FFFFFF"/>
    <!-- body -->
    <path d="M -14 -8 Q -14 -16 0 -16 Q 14 -16 14 -8 L 12 20 Q 0 24 -12 20 Z" fill="url(#shirt)"/>
    <!-- arms -->
    <path d="M -14 -6 Q -24 6 -22 20 L -14 22 Q -10 8 -8 0 Z" fill="url(#shirt)"/>
    <path d="M 14 -6 Q 26 -10 30 -22 L 22 -26 Q 18 -14 10 -8 Z" fill="url(#shirt)"/>
    <!-- hands -->
    <circle cx="-20" cy="22" r="4" fill="#FFD7B5"/>
    <circle cx="28" cy="-24" r="4" fill="#FFD7B5"/>
    <!-- head -->
    <circle cx="0" cy="-24" r="13" fill="#FFD7B5"/>
    <!-- hair -->
    <path d="M -13 -28 Q -10 -38 0 -38 Q 10 -38 13 -28 Q 10 -32 0 -32 Q -10 -32 -13 -28 Z" fill="#5C2E0E"/>
    <!-- smile -->
    <path d="M -3 -20 Q 0 -17 3 -20" stroke="#0F172A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- watch -->
    <rect x="-24" y="20" width="9" height="6" rx="1.5" fill="#5B21B6"/>
  </g>

  <!-- Parent's phone (top-right) showing same scene -->
  <g transform="translate(360 30) rotate(8)" filter="url(#soft)">
    <rect x="-32" y="-44" width="64" height="120" rx="10" fill="#0F172A"/>
    <rect x="-28" y="-38" width="56" height="108" rx="6" fill="#FCD34D"/>
    <rect x="-28" y="-38" width="56" height="48" fill="#A78BFA" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="#7C3AED"/>
    <path d="M -8 24 Q 0 18 8 24 L 8 36 L -8 36 Z" fill="#7C3AED"/>
    <!-- LIVE chip -->
    <rect x="-24" y="-34" width="28" height="10" rx="5" fill="#DC2626"/>
    <text x="-10" y="-26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="800" fill="#FFFFFF">LIVE</text>
  </g>
</svg>
