<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Child arrives safely at school, parent notified instantly">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E6D5FF"/>
    </linearGradient>
    <linearGradient id="school" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#bg)"/>

  <!-- Clouds -->
  <g fill="#FFFFFF" opacity="0.7">
    <ellipse cx="80" cy="60" rx="26" ry="9"/>
    <ellipse cx="90" cy="50" rx="16" ry="7"/>
    <ellipse cx="380" cy="75" rx="22" ry="8"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="280" width="480" height="80" fill="url(#ground)"/>
  <!-- Path -->
  <path d="M 120 360 Q 200 320 240 290 L 280 290 Q 240 320 160 360 Z" fill="#D4D4D8"/>

  <!-- School building -->
  <g filter="url(#soft)">
    <!-- main body -->
    <rect x="160" y="160" width="200" height="130" fill="url(#school)"/>
    <!-- roof -->
    <path d="M 150 160 L 260 110 L 370 160 Z" fill="url(#roof)"/>
    <!-- flag -->
    <line x1="260" y1="110" x2="260" y2="78" stroke="#0F172A" stroke-width="2"/>
    <path d="M 260 78 L 286 84 L 260 94 Z" fill="#DC2626"/>
    <!-- door -->
    <rect x="240" y="220" width="40" height="70" rx="3" fill="#7C2D12"/>
    <circle cx="272" cy="256" r="2" fill="#FBBF24"/>
    <!-- windows -->
    <rect x="180" y="190" width="32" height="32" rx="3" fill="#DBEAFE" stroke="#0F172A" stroke-width="2"/>
    <line x1="196" y1="190" x2="196" y2="222" stroke="#0F172A" stroke-width="1.5"/>
    <line x1="180" y1="206" x2="212" y2="206" stroke="#0F172A" stroke-width="1.5"/>
    <rect x="308" y="190" width="32" height="32" rx="3" fill="#DBEAFE" stroke="#0F172A" stroke-width="2"/>
    <line x1="324" y1="190" x2="324" y2="222" stroke="#0F172A" stroke-width="1.5"/>
    <line x1="308" y1="206" x2="340" y2="206" stroke="#0F172A" stroke-width="1.5"/>
    <!-- sign -->
    <rect x="220" y="138" width="80" height="18" rx="3" fill="#FFFFFF"/>
    <text x="260" y="152" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">SCHOOL</text>
  </g>

  <!-- Child with backpack walking toward school -->
  <g transform="translate(120 270)">
    <!-- backpack -->
    <rect x="-22" y="-2" width="14" height="24" rx="4" fill="#DC2626"/>
    <rect x="-24" y="0" width="6" height="10" rx="2" fill="#7F1D1D"/>
    <!-- legs -->
    <path d="M -6 14 L -8 32 L 0 32 L 0 14 Z" fill="#1E40AF"/>
    <path d="M 2 14 L 4 32 L 12 32 L 8 14 Z" fill="#1E3A8A"/>
    <!-- shoes -->
    <ellipse cx="-4" cy="34" rx="6" ry="2.5" fill="#FFFFFF"/>
    <ellipse cx="8" cy="34" rx="6" ry="2.5" fill="#FFFFFF"/>
    <!-- body -->
    <path d="M -12 -10 Q -12 -18 0 -18 Q 12 -18 12 -10 L 10 16 Q 0 20 -10 16 Z" fill="url(#shirt)"/>
    <!-- arms -->
    <path d="M -12 -8 Q -20 0 -20 14 L -14 16 Q -10 4 -8 -2 Z" fill="url(#shirt)"/>
    <path d="M 12 -8 Q 18 0 18 12 L 12 14 Q 8 4 8 -2 Z" fill="url(#shirt)"/>
    <!-- watch -->
    <rect x="-22" y="14" width="8" height="6" rx="1.5" fill="#5B21B6"/>
    <!-- head -->
    <circle cx="0" cy="-26" r="12" fill="#FFD7B5"/>
    <path d="M -12 -30 Q -10 -40 0 -40 Q 10 -40 12 -30 Q 10 -34 0 -34 Q -10 -34 -12 -30 Z" fill="#5C2E0E"/>
    <path d="M -3 -22 Q 0 -19 3 -22" stroke="#0F172A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Notification "Reached school" -->
  <g transform="translate(290 40)" filter="url(#soft)">
    <rect width="170" height="48" rx="12" fill="#FFFFFF"/>
    <circle cx="24" cy="24" r="12" fill="#22C55E"/>
    <path d="M 18 24 L 22 28 L 30 20" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">Reached school</text>
    <text x="44" y="36" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">Just now · 8:42 AM</text>
  </g>
</svg>
