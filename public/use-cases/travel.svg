<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Real-time awareness during commute and tuition travel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#E6D5FF"/>
    </linearGradient>
    <linearGradient id="bus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="busDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#bg)"/>

  <!-- Sky elements -->
  <g fill="#FFFFFF" opacity="0.7">
    <ellipse cx="100" cy="55" rx="26" ry="9"/>
    <ellipse cx="112" cy="46" rx="16" ry="7"/>
  </g>
  <!-- Buildings in background -->
  <g opacity="0.5">
    <rect x="20"  y="160" width="40" height="100" fill="#A78BFA"/>
    <rect x="70"  y="130" width="50" height="130" fill="#8B5CF6"/>
    <rect x="130" y="150" width="40" height="110" fill="#A78BFA"/>
    <rect x="350" y="140" width="50" height="120" fill="#8B5CF6"/>
    <rect x="410" y="160" width="50" height="100" fill="#A78BFA"/>
    <!-- windows -->
    <g fill="#FEF3C7">
      <rect x="30"  y="175" width="6" height="6"/>
      <rect x="44"  y="175" width="6" height="6"/>
      <rect x="30"  y="195" width="6" height="6"/>
      <rect x="80"  y="145" width="6" height="6"/>
      <rect x="100" y="145" width="6" height="6"/>
      <rect x="80"  y="165" width="6" height="6"/>
      <rect x="100" y="165" width="6" height="6"/>
      <rect x="360" y="155" width="6" height="6"/>
      <rect x="380" y="155" width="6" height="6"/>
      <rect x="360" y="175" width="6" height="6"/>
      <rect x="380" y="175" width="6" height="6"/>
    </g>
  </g>

  <!-- Road -->
  <rect x="0" y="260" width="480" height="80" fill="url(#road)"/>
  <!-- Lane markings -->
  <g stroke="#FBBF24" stroke-width="3" stroke-dasharray="20 14">
    <line x1="0" y1="300" x2="480" y2="300"/>
  </g>

  <!-- Route path (dashed, going up to a pin) -->
  <g fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-dasharray="3 6" opacity="0.6">
    <path d="M 80 280 Q 160 220 240 200 Q 320 180 400 130"/>
  </g>
  <!-- Destination pin -->
  <g transform="translate(400 100)" filter="url(#soft)">
    <path d="M 0 0 C -10 0 -16 7 -16 16 C -16 28 0 42 0 42 C 0 42 16 28 16 16 C 16 7 10 0 0 0 Z" fill="#7C3AED"/>
    <circle cx="0" cy="16" r="6" fill="#FFFFFF"/>
  </g>

  <!-- School bus -->
  <g transform="translate(180 220)" filter="url(#soft)">
    <!-- body -->
    <rect x="0" y="0" width="180" height="60" rx="10" fill="url(#bus)"/>
    <!-- hood -->
    <rect x="160" y="14" width="30" height="46" rx="6" fill="url(#busDark)"/>
    <!-- stripe -->
    <rect x="0" y="42" width="190" height="6" fill="#000000" opacity="0.25"/>
    <!-- windows -->
    <rect x="10" y="10" width="32" height="22" rx="3" fill="#DBEAFE"/>
    <rect x="50" y="10" width="32" height="22" rx="3" fill="#DBEAFE"/>
    <rect x="90" y="10" width="32" height="22" rx="3" fill="#DBEAFE"/>
    <rect x="130" y="10" width="22" height="22" rx="3" fill="#DBEAFE"/>
    <!-- driver window divider -->
    <rect x="165" y="14" width="20" height="16" rx="2" fill="#DBEAFE"/>
    <!-- child silhouette in window 2 (waving) -->
    <g transform="translate(66 22)">
      <circle cx="0" cy="-2" r="5" fill="#FFD7B5"/>
      <path d="M -6 4 Q -6 14 0 14 Q 6 14 6 4 L 5 18 L -5 18 Z" fill="url(#shirt)"/>
      <circle cx="-9" cy="0" r="2.5" fill="#FFD7B5"/>
    </g>
    <!-- door -->
    <rect x="148" y="22" width="14" height="32" rx="2" fill="#B45309" opacity="0.5"/>
    <!-- headlight -->
    <circle cx="186" cy="34" r="4" fill="#FEF3C7"/>
    <!-- wheels -->
    <circle cx="40" cy="64" r="14" fill="#0F172A"/>
    <circle cx="40" cy="64" r="6" fill="#475569"/>
    <circle cx="150" cy="64" r="14" fill="#0F172A"/>
    <circle cx="150" cy="64" r="6" fill="#475569"/>
  </g>

  <!-- "On the way" chip (top-left) -->
  <g transform="translate(30 30)" filter="url(#soft)">
    <rect width="150" height="36" rx="18" fill="#FFFFFF"/>
    <circle cx="20" cy="18" r="6" fill="#7C3AED"/>
    <path d="M 16 18 L 19 21 L 24 15" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#0F172A">On the way · 12 min</text>
  </g>
</svg>
